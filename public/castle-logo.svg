<svg width="185" height="48" viewBox="0 0 185 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C084FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E879F9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Castle Base -->
  <rect x="15" y="32" width="60" height="16" fill="url(#neonGradient)" filter="url(#glow)"/>
  
  <!-- Castle Towers -->
  <rect x="10" y="20" width="12" height="28" fill="#8B5CF6" filter="url(#glow)"/>
  <rect x="25" y="15" width="12" height="33" fill="#8B5CF6" filter="url(#glow)"/>
  <rect x="40" y="18" width="12" height="30" fill="#8B5CF6" filter="url(#glow)"/>
  <rect x="55" y="12" width="12" height="36" fill="#8B5CF6" filter="url(#glow)"/>
  <rect x="70" y="22" width="12" height="26" fill="#8B5CF6" filter="url(#glow)"/>
  
  <!-- Tower Tops -->
  <polygon points="16,20 10,12 22,12" fill="#C084FC" filter="url(#glow)"/>
  <polygon points="31,15 25,7 37,7" fill="#C084FC" filter="url(#glow)"/>
  <polygon points="46,18 40,10 52,10" fill="#C084FC" filter="url(#glow)"/>
  <polygon points="61,12 55,4 67,4" fill="#C084FC" filter="url(#glow)"/>
  <polygon points="76,22 70,14 82,14" fill="#C084FC" filter="url(#glow)"/>
  
  <!-- Text: LIBRARY OF JUSTICE -->
  <text x="95" y="20" font-family="serif" font-size="14" font-weight="bold" fill="url(#neonGradient)" filter="url(#glow)">LIBRARY</text>
  <text x="95" y="35" font-family="serif" font-size="8" fill="#B399FF">OF JUSTICE</text>
  
  <!-- Sci-Fi Elements -->
  <circle cx="20" cy="25" r="1" fill="#E879F9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="22" r="1" fill="#E879F9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="25" r="1" fill="#E879F9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="20" r="1" fill="#E879F9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>